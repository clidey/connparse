id: azure-blob
name: Azure Blob
type: object_storage
schemes:
  - azureblob
  - azblob
adapter: object-storage
authority:
  host: true
  account: true
resource:
  type: container
  required: false
path:
  type: blob
  required: false
credentials:
  username: true
  password: true
  access_key: true
  secret_key: true
  token: true
query_parameters:
  auth_method:
    type: string
  tenant_id:
    type: string
  client_id:
    type: string
  client_secret:
    type: string
  account_key:
    type: string
  sas:
    type: string
validation:
  require_host: true
options:
  provider: azure
redaction:
  safe_credentials: [username]
  sensitive_keys: [password, access_key, secret_key, token, client_secret, account_key, sas]
