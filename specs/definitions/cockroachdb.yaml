id: cockroachdb
name: CockroachDB
type: database
schemes:
  - cockroach
  - cockroachdb
adapter: postgres-compatible
defaults:
  port: 26257
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  application_name:
    type: string
  options:
    type: string
  password:
    type: string
  results_buffer_size:
    type: string
  sslmode:
    type: string
    allowed: [disable, allow, prefer, require, verify-ca, verify-full]
  sslcert:
    type: string
  sslkey:
    type: string
  sslrootcert:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: postgres
