id: db2
name: IBM Db2
type: database
schemes:
  - db2
adapter: generic-uri
defaults:
  port: 50000
authority:
  host: true
  port: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters: {}
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
