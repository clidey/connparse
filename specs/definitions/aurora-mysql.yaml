id: aurora-mysql
name: Aurora MySQL
type: database
schemes:
  - aurora-mysql
adapter: mysql-compatible
defaults:
  port: 3306
authority:
  host: true
  port: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  charset:
    type: string
  ssl:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: mysql
  provider: aws
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
