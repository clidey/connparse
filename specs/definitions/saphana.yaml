id: saphana
name: SAP HANA
type: database
schemes:
  - saphana
  - hana
adapter: generic-uri
defaults:
  port: 30015
authority:
  host: true
  port: true
resource:
  type: database
  required: false
path:
  type: schema_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  auth_method:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
