id: mariadb
name: MariaDB
type: database
schemes:
  - mariadb
adapter: mysql-compatible
defaults:
  port: 3306
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  sslMode:
    type: string
    allowed: [disable, trust, verify-ca, verify-full]
  ssl:
    type: string
  user:
    type: string
  password:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
