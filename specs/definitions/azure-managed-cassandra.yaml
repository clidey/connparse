id: azure-managed-cassandra
name: Azure Managed Cassandra
type: database
schemes:
  - azure-managed-cassandra
adapter: generic-uri
defaults:
  port: 9042
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: keyspace
  required: false
path:
  type: table_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  consistency:
    type: string
  datacenter:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: cassandra
  provider: azure
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
