id: mongodb
name: MongoDB
type: database
schemes:
  - mongodb
  - mongodb+srv
adapter: mongodb
defaults:
  port: 27017
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: collection
  required: false
credentials:
  username: true
  password: true
query_parameters:
  authSource:
    type: string
  authMechanism:
    type: string
  authMechanismProperties:
    type: string
  connectTimeoutMS:
    type: number
  directConnection:
    type: boolean
  replicaSet:
    type: string
  retryWrites:
    type: boolean
  serverSelectionTimeoutMS:
    type: number
  tls:
    type: boolean
  tlsCAFile:
    type: string
  tlsCertificateKeyFile:
    type: string
  tlsInsecure:
    type: boolean
  ssl:
    type: boolean
  w:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
