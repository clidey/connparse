id: mongodb
name: MongoDB
type: database
schemes:
  - mongodb
  - mongodb+srv
adapter: mongodb
defaults:
  port: 27017
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: collection
  required: false
credentials:
  username: true
  password: true
query_parameters:
  authSource:
    type: string
  authMechanism:
    type: string
  authMechanismProperties:
    type: string
  connectTimeoutMS:
    type: number
  directConnection:
    type: boolean
  replicaSet:
    type: string
  retryWrites:
    type: boolean
  serverSelectionTimeoutMS:
    type: number
  tls:
    type: boolean
  tlsCAFile:
    type: string
  tlsCertificateKeyFile:
    type: string
  tlsInsecure:
    type: boolean
  ssl:
    type: boolean
  w:
    type: string
semantic_fields:
  ssl_mode:
    sources:
      - from_query: tlsInsecure
        values:
          true: insecure
      - from_query: tls
        values:
          true: enabled
          false: disabled
      - from_query: ssl
        values:
          true: enabled
          false: disabled
  dns_enabled:
    sources:
      - from_option: srv
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password, tlsCAFile, tlsCertificateKeyFile]
