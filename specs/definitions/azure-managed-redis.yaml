id: azure-managed-redis
name: Azure Managed Redis
type: cache
schemes:
  - azure-managed-redis
  - azure-managed-rediss
adapter: redis
defaults:
  port: 10000
authority:
  host: true
  port: true
resource:
  type: database_index
  required: false
path:
  type: none
  required: false
credentials:
  username: true
  password: true
query_parameters:
  protocol:
    type: number
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: redis
  provider: azure
  tls: true
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
