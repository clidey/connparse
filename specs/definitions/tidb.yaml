id: tidb
name: TiDB
type: database
schemes:
  - tidb
adapter: mysql-compatible
defaults:
  port: 4000
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  ssl-mode:
    type: string
    allowed: [DISABLED, PREFERRED, REQUIRED, VERIFY_CA, VERIFY_IDENTITY]
    aliases: [sslMode]
    normalized_values:
      disabled: DISABLED
      preferred: PREFERRED
      required: REQUIRED
      verify-ca: VERIFY_CA
      verify_ca: VERIFY_CA
      verify-identity: VERIFY_IDENTITY
      verify_identity: VERIFY_IDENTITY
  ssl:
    type: string
  charset:
    type: string
  parseTime:
    type: boolean
  loc:
    type: string
  allowCleartextPasswords:
    type: boolean
semantic_fields:
  ssl_mode:
    sources:
      - from_query: ssl-mode
        values:
          DISABLED: disabled
          PREFERRED: preferred
          REQUIRED: required
          VERIFY_CA: verify-ca
          VERIFY_IDENTITY: verify-identity
  parse_time:
    sources:
      - from_query: parseTime
        values:
          true: true
          false: false
  loc:
    sources:
      - from_query: loc
  allow_cleartext_passwords:
    sources:
      - from_query: allowCleartextPasswords
        values:
          true: true
          false: false
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: mysql
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
