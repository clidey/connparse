id: tidb
name: TiDB
type: database
schemes:
  - tidb
adapter: mysql-compatible
defaults:
  port: 4000
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  ssl-mode:
    type: string
  ssl:
    type: string
  charset:
    type: string
  parseTime:
    type: boolean
  loc:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: mysql
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
