id: redis
name: Redis
type: cache
schemes:
  - redis
  - rediss
adapter: redis
defaults:
  port: 6379
authority:
  host: true
  port: true
resource:
  type: database_index
  required: false
path:
  type: none
  required: false
credentials:
  username: true
  password: true
query_parameters:
  protocol:
    type: number
semantic_fields:
  ssl_mode:
    sources:
      - from_option: tls
        values:
          true: enabled
          false: disabled
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
