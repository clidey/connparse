id: postgres
name: PostgreSQL
type: database
schemes:
  - postgres
  - postgresql
adapter: postgres-compatible
defaults:
  port: 5432
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: true
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  sslmode:
    type: string
    allowed: [disable, allow, prefer, require, verify-ca, verify-full]
  target_session_attrs:
    type: string
    allowed: [any, read-write, read-only, primary, standby, prefer-standby]
  application_name:
    type: string
  connect_timeout:
    type: number
  host:
    type: string
  hostaddr:
    type: string
  options:
    type: string
  passfile:
    type: string
  password:
    type: string
  port:
    type: string
  require_auth:
    type: string
  search_path:
    type: string
  service:
    type: string
  sslcert:
    type: string
  sslkey:
    type: string
  sslrootcert:
    type: string
semantic_fields:
  ssl_mode:
    sources:
      - from_query: sslmode
        values:
          disable: disabled
          require: required
          verify-ca: verify-ca
          verify-full: verify-identity
  search_path:
    sources:
      - from_query: search_path
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password, passfile, sslcert, sslkey, sslrootcert]
