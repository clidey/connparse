id: mysql
name: MySQL
type: database
schemes:
  - mysql
  - mysqlx
  - mysqlx+srv
adapter: mysql-compatible
defaults:
  port: 3306
authority:
  host: true
  port: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  auth-method:
    type: string
    allowed: [AUTO, MYSQL41, SHA256_MEMORY, FROM_CAPABILITIES, FALLBACK, PLAIN]
  get-server-public-key:
    type: boolean
  ssl:
    type: string
  ssl-mode:
    type: string
    allowed: [DISABLED, PREFERRED, REQUIRED, VERIFY_CA, VERIFY_IDENTITY]
  charset:
    type: string
  tls-version:
    type: string
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
