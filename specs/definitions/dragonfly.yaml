id: dragonfly
name: Dragonfly
type: cache
schemes:
  - dragonfly
  - dragonflys
adapter: redis
defaults:
  port: 6379
authority:
  host: true
  port: true
resource:
  type: database_index
  required: false
path:
  type: none
  required: false
credentials:
  username: true
  password: true
query_parameters:
  protocol:
    type: number
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
options:
  compatible_with: redis
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
