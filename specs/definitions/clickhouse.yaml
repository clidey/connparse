id: clickhouse
name: ClickHouse
type: database
schemes:
  - clickhouse
  - ch
adapter: clickhouse
defaults:
  port: 9000
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  database:
    type: string
  ssl:
    type: boolean
  sslmode:
    type: string
    allowed: [disable, require, verify-ca, verify-full]
  user:
    type: string
  password:
    type: string
  readonly:
    type: number
  debug:
    type: boolean
  createDatabaseIfNotExist:
    type: boolean
  httpProtocol:
    type: string
    allowed: [http, https]
semantic_fields:
  ssl_mode:
    sources:
      - from_query: sslmode
        values:
          disable: disabled
          require: required
          verify-ca: verify-ca
          verify-full: verify-identity
      - from_query: ssl
        values:
          true: enabled
          false: disabled
      - from_option: protocol
        values:
          https: enabled
          http: disabled
  http_protocol:
    sources:
      - from_query: httpProtocol
      - from_option: protocol
        values:
          http: http
          https: https
  readonly:
    sources:
      - from_query: readonly
  debug:
    sources:
      - from_query: debug
        values:
          true: true
          false: false
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password]
