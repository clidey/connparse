id: elasticsearch
name: Elasticsearch
type: api
schemes:
  - elasticsearch
  - elastic
  - elasticsearch+http
  - elasticsearch+https
adapter: elasticsearch
defaults:
  port: 9200
authority:
  host: true
  port: true
resource:
  type: index
  required: false
path:
  type: api_path
  required: false
credentials:
  username: true
  password: true
  api_key: true
  token: true
query_parameters:
  api_key:
    type: string
    aliases: [apiKey]
  token:
    type: string
semantic_fields:
  ssl_mode:
    sources:
      - from_option: tls
        values:
          true: enabled
          false: disabled
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
redaction:
  safe_credentials: [username]
  sensitive_keys: [password, api_key, apiKey, token]
