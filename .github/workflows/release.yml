name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer bump to apply when version is empty
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      version:
        description: Explicit version without v, for example 0.2.0
        required: false
        type: string
      preid:
        description: Prerelease identifier for bump=prerelease
        required: false
        default: alpha
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable corepack
        run: corepack enable

      - name: Setup Go
        # actions/setup-go@v6
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: packages/go/go.mod
          cache-dependency-path: packages/go/go.sum

      - name: Setup Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ inputs.version }}"
          BUMP="${{ inputs.bump }}"
          PREID="${{ inputs.preid }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
            npm --prefix packages/js version "$VERSION" --no-git-tag-version
          elif [ "$BUMP" = "prerelease" ]; then
            npm --prefix packages/js version prerelease --preid "$PREID" --no-git-tag-version
            VERSION="$(node -p "require('./packages/js/package.json').version")"
          else
            npm --prefix packages/js version "$BUMP" --no-git-tag-version
            VERSION="$(node -p "require('./packages/js/package.json').version")"
          fi
          node tools/sync-versions.mjs --set "$VERSION"

          GO_TAG="packages/go/v$VERSION"
          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            echo "Tag $GO_TAG already exists" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "go_tag=$GO_TAG" >> "$GITHUB_OUTPUT"

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Package consumption
        run: pnpm check:package

      - name: npm pack dry-run
        run: pnpm --filter @clidey/connparse pack --dry-run

      - name: Build Python package
        run: |
          python -m pip install --upgrade build
          python -m build packages/python

      - name: Commit version bump
        run: |
          git add packages/js/package.json packages/python/pyproject.toml packages/rust/Cargo.toml packages/rust/Cargo.lock
          git commit -m "release v${{ steps.version.outputs.version }}"

      - name: Push version commit
        run: git push origin HEAD:${{ github.ref_name }}

      - name: Publish npm package
        working-directory: packages/js
        run: npm publish --access public

      - name: Publish Python package
        # pypa/gh-action-pypi-publish@release/v1
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: packages/python/dist

      - name: Tag Go module
        run: |
          git tag "${{ steps.version.outputs.go_tag }}"
          git push origin "${{ steps.version.outputs.go_tag }}"

      - name: Create Go GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.go_tag }}" \
            --title "Go package v${{ steps.version.outputs.version }}" \
            --notes "Go module release for github.com/clidey/connparse/packages/go v${{ steps.version.outputs.version }}."
