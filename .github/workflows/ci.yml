name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod
          cache-dependency-path: packages/go/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Package consumption
        run: pnpm check:package

      - name: npm pack dry-run
        run: pnpm --filter @clidey/connparse pack --dry-run
