id: yugabytedb
name: YugabyteDB
type: database
schemes:
  - yugabyte
  - yugabytedb
adapter: postgres-compatible
defaults:
  port: 5433
authority:
  host: true
  port: true
  multi_host: true
resource:
  type: database
  required: false
path:
  type: object_path
  required: false
credentials:
  username: true
  password: true
query_parameters:
  loadBalance:
    type: string
  ssl:
    type: boolean
  sslmode:
    type: string
    allowed: [disable, allow, prefer, require, verify-ca, verify-full]
  sslrootcert:
    type: string
  topologyKeys:
    type: string
  ybServersRefreshInterval:
    type: number
validation:
  require_host: true
  port_range:
    min: 1
    max: 65535
