[package]
name = "connparse"
version = "0.4.0"
edition = "2024"
description = "Parse database connection strings, DSNs, URLs, file paths, and cloud storage URIs."
license = "Apache-2.0"
repository = "https://github.com/clidey/connparse"
documentation = "https://docs.rs/connparse"
readme = "README.md"
keywords = ["connection-string", "database-url", "dsn", "parser", "uri"]
categories = ["config", "database", "parser-implementations"]

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

[dev-dependencies]
serde_json = "1.0.149"
